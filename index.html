<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Panel - CLT Floor Panel Properties</title>
    <meta name="description" content="Kalkulator sifat panel lantai CLT menggunakan metode Shear Analogy dan Gamma.">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #222;
            font-size: 14px;
        }

        .main-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #333;
            padding-bottom: 6px;
            margin-bottom: 16px;
        }

        .panel {
            background: #fff;
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 16px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #555;
            margin-bottom: 4px;
        }

        .form-control, .form-select {
            border-radius: 0;
            border: 1px solid #ccc;
            font-size: 14px;
            padding: 6px 10px;
        }

        .form-control:focus, .form-select:focus {
            border-color: #666;
            box-shadow: none;
        }

        .form-check-input {
            border-radius: 0;
        }

        .form-check-input:checked {
            background-color: #333;
            border-color: #333;
        }

        .form-check-input:focus {
            box-shadow: none;
        }

        /* Layup visual */
        .layup-box {
            border: 1px solid #ccc;
            padding: 10px;
            background: #fafafa;
        }

        .visual-layer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 10px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid #bbb;
            margin-bottom: 3px;
        }

        .layer-0 {
            background: #e8d44d;
            color: #333;
        }

        .layer-90 {
            background: #888;
            color: #fff;
        }

        /* Result box */
        .result-box {
            border: 2px solid #333;
            padding: 16px;
            text-align: center;
            background: #fff;
            margin-bottom: 16px;
        }

        .result-label {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 4px;
        }

        .result-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #222;
            font-family: "Courier New", Courier, monospace;
        }

        .result-unit {
            font-size: 0.8rem;
            color: #888;
        }

        /* Table */
        .calc-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        .calc-table th {
            background: #eee;
            border: 1px solid #ccc;
            padding: 8px 6px;
            font-weight: 600;
            text-align: center;
            font-size: 0.75rem;
            color: #444;
        }

        .calc-table td {
            border: 1px solid #ddd;
            padding: 6px;
            text-align: center;
            font-family: "Courier New", Courier, monospace;
        }

        .calc-table .total-row td {
            font-weight: 700;
            background: #f9f9f9;
            border-top: 2px solid #333;
        }

        .row-inactive td {
            color: #ccc;
        }

        .error-msg {
            background: #fff3f3;
            border: 1px solid #e88;
            color: #c00;
            padding: 10px;
            display: none;
            font-size: 0.85rem;
        }

        .bug-info {
            background: #fffde7;
            border: 1px solid #e0d85e;
            color: #665;
            padding: 8px 12px;
            font-size: 0.8rem;
            margin-top: 12px;
        }

        .subtitle {
            color: #777;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container py-4" style="max-width: 1100px;">

        <!-- Header -->
        <div class="mb-4">
            <h1 class="main-title">Calculator Panel</h1>
            <p class="subtitle mb-0">CLT Floor Panel Properties &mdash; Shear Analogy &amp; Gamma Method</p>
        </div>

        <div class="row g-3">
            <!-- Kolom Kiri: Input -->
            <div class="col-lg-5 col-12">
                <div class="panel">
                    <h2 class="section-title">Input</h2>

                    <form id="cltForm">
                        <div class="row g-2 mb-2">
                            <div class="col-6">
                                <label for="inputGrade" class="form-label">Grade</label>
                                <select id="inputGrade" class="form-select">
                                    <option value="MGP10" selected>MGP10</option>
                                    <option value="MGP12">MGP12</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label for="inputLayers" class="form-label">Total Layers</label>
                                <select id="inputLayers" class="form-select">
                                    <option value="3">3</option>
                                    <option value="5" selected>5</option>
                                    <option value="7">7</option>
                                    <option value="9">9</option>
                                </select>
                            </div>
                        </div>

                        <div class="row g-2 mb-2">
                            <div class="col-6">
                                <label for="inputThickness" class="form-label">Thickness Each Layer (mm)</label>
                                <input type="number" id="inputThickness" class="form-control" value="35" min="5" max="150">
                            </div>
                            <div class="col-6">
                                <label for="inputLength" class="form-label">Length (m)</label>
                                <input type="number" id="inputLength" class="form-control" value="5" min="1" max="30" step="0.1">
                            </div>
                        </div>

                        <div class="row g-2 mb-2">
                            <div class="col-6">
                                <label for="inputBeff" class="form-label">beff (mm)</label>
                                <input type="number" id="inputBeff" class="form-control" value="1000" min="100" max="5000" step="100">
                            </div>
                            <div class="col-6">
                                <label for="inputMethod" class="form-label">Analytical Method</label>
                                <select id="inputMethod" class="form-select">
                                    <option value="Shear Analogy" selected>Shear Analogy</option>
                                    <option value="Gamma">Gamma</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-check form-switch mt-3">
                            <input class="form-check-input" type="checkbox" id="toggleExcelBug" checked>
                            <label class="form-check-label" for="toggleExcelBug" style="font-size:0.8rem; color:#666;">
                                Match Excel (simulasi bug rumus)
                            </label>
                        </div>
                    </form>
                </div>

                <!-- CLT Layup Visual -->
                <div class="panel">
                    <h2 class="section-title">CLT Layup</h2>
                    <div class="layup-box" id="layupVisualizer">
                        <!-- rendered by JS -->
                    </div>
                </div>
            </div>

            <!-- Kolom Kanan: Output -->
            <div class="col-lg-7 col-12">
                <div class="panel">
                    <h2 class="section-title">Output</h2>

                    <!-- Error -->
                    <div class="error-msg" id="errorBlock">
                        <strong>Error:</strong> <span id="errorMessage"></span>
                    </div>

                    <div id="outputBlock">
                        <!-- EI_eff -->
                        <div class="result-box">
                            <div class="result-label">Effective Bending Stiffness (EI<sub>eff</sub>)</div>
                            <div class="result-value" id="resultEiEff">2,12E+12</div>
                            <div class="result-unit">N-mm²/m</div>
                        </div>

                        <!-- Table -->
                        <div class="table-responsive">
                            <table class="calc-table" id="resultsTable">
                                <thead id="tableHeader"></thead>
                                <tbody id="tableBody"></tbody>
                            </table>
                        </div>

                        <!-- Bug info -->
                        <div class="bug-info" id="bugInfoBlock">
                            <strong>Info:</strong> Mode simulasi aktif &mdash; hasil mengikuti rumus Excel asli (termasuk bug referensi pada γ₃).
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="type/material-grade-type.js"></script>
    <script src="type/clt-layer-type.js"></script>
    <script src="type/clt-layer-properties-type.js"></script>
    <script src="type/clt-layup-type.js"></script>
    <script src="type/panel-properties-type.js"></script>
    <script src="calculation/panel-properties.js"></script>
    <script src="calculator.js"></script>
</body>
</html>
